name: Clasp Push on Git Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate with Google
        env:
          CLASP_ACCESS_TOKEN: ${{ secrets.CLASP_ACCESS_TOKEN }}
          CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
          CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.clasprc
          cat <<EOF > ~/.clasprc.json
          {
            "token": {
              "access_token": "$CLASP_ACCESS_TOKEN",
              "refresh_token": "$CLASP_REFRESH_TOKEN",
              "scope": "https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/drive.file",
              "token_type": "Bearer"
            },
            "oauth2ClientSettings": {
              "clientId": "$CLASP_CLIENT_ID",
              "clientSecret": "$CLASP_CLIENT_SECRET",
              "redirectUri": "urn:ietf:wg:oauth:2.0:oob"
            }
          }
          EOF

      - name: Push to Google Apps Script
        run: clasp push
